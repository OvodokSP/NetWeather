name: Manual Repository Patch

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply repository cleanup patch
        run: |
          set -e

          cat > AGENTS.md <<'EOF'
          # NetWeather Agent Rules

          1. Do not rewrite the project from scratch unless explicitly requested.
          2. Use branches: fix/*, feature/*, release/*.
          3. Before commit, run:
             ./gradlew clean
             ./gradlew test
             ./gradlew lint
             ./gradlew assembleDebug
          4. Do not use Python scripts to patch Android source code or CI.
          5. GitHub Actions must build directly through Gradle.
          6. Main screen, widget and background monitoring must use one source of truth.
          7. After every network check, update persistent state and widgets.
          8. Do not use PeriodicWorkRequest for intervals below 15 minutes.
          9. For 30 seconds and 1 minute use OneTimeWorkRequest with re-scheduling.
          10. Update README.md and CHANGELOG.md after functional changes.
          11. Do not leave TODOs or placeholder implementations.
          EOF

          rm -f setup_project.py
          rm -f fix_errors.py
          rm -f fix_final.py
          rm -f fix_final_v2.py
          rm -f fix_canvas_final.py
          rm -f fix_structure.py

          mkdir -p .github/workflows

          cat > .github/workflows/build.yml <<'EOF'
          name: Build APK

          on:
            push:
              branches: [ main ]
            pull_request:
            workflow_dispatch:

          jobs:
            build:
              runs-on: ubuntu-latest

              steps:
                - name: Checkout repository
                  uses: actions/checkout@v4

                - name: Set up JDK 17
                  uses: actions/setup-java@v4
                  with:
                    java-version: '17'
                    distribution: 'temurin'

                - name: Setup Gradle
                  uses: gradle/actions/setup-gradle@v4

                - name: Make Gradle executable
                  run: chmod +x ./gradlew

                - name: Clean
                  run: ./gradlew clean --no-daemon

                - name: Test
                  run: ./gradlew test --no-daemon

                - name: Lint
                  run: ./gradlew lint --no-daemon

                - name: Build Debug APK
                  run: ./gradlew assembleDebug --no-daemon

                - name: Upload Debug APK
                  uses: actions/upload-artifact@v4
                  with:
                    name: NetWeather-Debug
                    path: app/build/outputs/apk/debug/*.apk
          EOF

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "Clean CI and add agent rules"
          branch: fix/clean-ci-agent-rules
          title: "Clean CI and add AGENTS.md"
          body: |
            This PR:
            - adds AGENTS.md
            - removes Python auto-fix scripts
            - replaces build.yml with clean Gradle CI
            - uploads debug APK artifact
          delete-branch: true