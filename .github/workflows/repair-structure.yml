name: Repair Project Structure

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  repair:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Repair structure
        run: python3 scripts/repair_structure.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "Repair Android project structure"
          branch: fix/repair-project-structure
          title: "Repair Android project structure"
          body: |
            This PR repairs the Android project structure:
            - moves Kotlin files according to their package declarations
            - moves XML files to correct res folders
            - removes Python auto-fix scripts
            - removes misplaced markdown/yaml/python files from source folders

            Next step after merge:
            - run Build NetWeather APK
            - fix remaining Kotlin/Gradle errors if any
          delete-branch: true