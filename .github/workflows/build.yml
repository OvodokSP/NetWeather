name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.7'
    
    - name: Generate Gradle wrapper
      run: gradle wrapper --gradle-version 8.7
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Create launcher icons from Base64
      run: |
        mkdir -p app/src/main/res/drawable
        mkdir -p app/src/main/res/mipmap-anydpi-v26
        
        echo '' | base64 -d > app/src/main/res/drawable/ic_launcher_foreground.xml
        
        echo '' | base64 -d > app/src/main/res/drawable/ic_launcher_background.xml
        
        echo '' | base64 -d > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
        
        echo '' | base64 -d > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
        
        ls -la app/src/main/res/drawable/
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NetWeather-Debug
        path: app/build/outputs/apk/debug/app-debug.apk
