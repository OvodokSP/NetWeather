name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.7'
    
    - name: Generate Gradle wrapper
      run: gradle wrapper --gradle-version 8.7
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Run setup script
      run: python3 setup_project.py
    
    - name: Fix compilation errors
      run: python3 fix_errors.py
    
    - name: Fix final error
      run: python3 fix_final.py
    
    - name: Fix final error v2
      run: python3 fix_final_v2.py
    
    - name: Fix Canvas error definitively
      run: python3 fix_canvas_final.py
    
    - name: Verify fixed file
      run: |
        echo "=== Checking AvailabilityIndexCard.kt ==="
        cat app/src/main/java/com/netweather/presentation/main/components/AvailabilityIndexCard.kt | head -80
        echo "=== File size ==="
        wc -l app/src/main/java/com/netweather/presentation/main/components/AvailabilityIndexCard.kt
    
    - name: Remove Gradle cache completely
      run: |
        rm -rf ~/.gradle/caches/
        rm -rf app/build/
        ./gradlew clean --no-daemon
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NetWeather-Debug
        path: app/build/outputs/apk/debug/app-debug.apk