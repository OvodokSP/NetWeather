name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.7'
    
    - name: Generate Gradle wrapper
      run: gradle wrapper --gradle-version 8.7
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Create all resource directories
      run: |
        mkdir -p app/src/main/res/drawable
        mkdir -p app/src/main/res/mipmap-anydpi-v26
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/xml
        mkdir -p app/src/main/res/layout
        echo "Directories created"
    
    - name: Create launcher icons
      run: |
        echo '' | base64 -d > app/src/main/res/drawable/ic_launcher_foreground.xml
        echo '' | base64 -d > app/src/main/res/drawable/ic_launcher_background.xml
        echo '' | base64 -d > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
        echo '' | base64 -d > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
        echo "Icons created"
    
    - name: Create strings.xml
      run: |
        echo '' | base64 -d > app/src/main/res/values/strings.xml
        echo "strings.xml created"
    
    - name: Create themes.xml
      run: |
        echo '' | base64 -d > app/src/main/res/values/themes.xml
        echo "themes.xml created"
    
    - name: Create xml resource files
      run: |
        echo '' | base64 -d > app/src/main/res/xml/data_extraction_rules.xml
        
        echo 'PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPGZ1bGwtYmFja3VwLWNvbnRlbnQ+CiAgICA8aW5jbHVkZSBkb21haW49InNoYXJlZHByZWYiIHBhdGg9Ii4iLz4KPC9mdWxsLWJhY2t1cC1jb250ZW50Pg==' | base64 -d > app/src/main/res/xml/backup_rules.xml
        
        echo '' | base64 -d > app/src/main/res/xml/widget_small_info.xml
        
        echo '' | base64 -d > app/src/main/res/xml/widget_medium_info.xml
        
        echo '' | base64 -d > app/src/main/res/xml/widget_large_info.xml
        
        echo "XML files created"
    
    - name: Verify all resources
      run: |
        echo "=== Values directory ==="
        ls -la app/src/main/res/values/
        echo "=== XML directory ==="
        ls -la app/src/main/res/xml/
        echo "=== Drawable directory ==="
        ls -la app/src/main/res/drawable/
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NetWeather-Debug
        path: app/build/outputs/apk/debug/app-debug.apk