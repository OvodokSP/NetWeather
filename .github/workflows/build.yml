name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.7'
    
    - name: Generate Gradle wrapper
      run: gradle wrapper --gradle-version 8.7
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Run setup script
      run: python3 setup_project.py
    
    - name: Verify project structure
      run: |
        echo "=== Java files ==="
        find app/src/main/java -name "*.kt" | head -20
        echo "=== Resource files ==="
        ls -la app/src/main/res/values/
        ls -la app/src/main/res/xml/
        ls -la app/src/main/res/drawable/
        ls -la app/src/main/res/layout/
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NetWeather-Debug
        path: app/build/outputs/apk/debug/app-debug.apk