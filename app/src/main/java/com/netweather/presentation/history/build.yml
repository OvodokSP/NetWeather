name: Build APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Позволяет запускать вручную

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.7'
    
    - name: Generate Gradle wrapper
      run: gradle wrapper --gradle-version 8.7
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Generate placeholder launcher icons
      run: |
        # Создаём простые PNG иконки через ImageMagick (есть в ubuntu-latest)
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        
        # Генерируем простые зелёные квадраты как иконки
        convert -size 48x48 xc:'#006C4C' app/src/main/res/mipmap-mdpi/ic_launcher.png
        convert -size 72x72 xc:'#006C4C' app/src/main/res/mipmap-hdpi/ic_launcher.png
        convert -size 96x96 xc:'#006C4C' app/src/main/res/mipmap-xhdpi/ic_launcher.png
        convert -size 144x144 xc:'#006C4C' app/src/main/res/mipmap-xxhdpi/ic_launcher.png
        convert -size 192x192 xc:'#006C4C' app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
        
        # Копируем для round иконки
        for size in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
          cp app/src/main/res/mipmap-$size/ic_launcher.png app/src/main/res/mipmap-$size/ic_launcher_round.png
        done
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: NetWeather-Debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
    
    - name: Run Unit Tests
      run: ./gradlew test --no-daemon
    
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: app/build/reports/tests/