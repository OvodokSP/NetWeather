name: Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.7'
    
    - name: Generate Gradle wrapper
      run: gradle wrapper --gradle-version 8.7
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Generate placeholder icons
      run: |
        mkdir -p app/src/main/res/mipmap-{mdpi,hdpi,xhdpi,xxhdpi,xxxhdpi}
        convert -size 48x48 xc:'#006C4C' app/src/main/res/mipmap-mdpi/ic_launcher.png
        convert -size 72x72 xc:'#006C4C' app/src/main/res/mipmap-hdpi/ic_launcher.png
        convert -size 96x96 xc:'#006C4C' app/src/main/res/mipmap-xhdpi/ic_launcher.png
        convert -size 144x144 xc:'#006C4C' app/src/main/res/mipmap-xxhdpi/ic_launcher.png
        convert -size 192x192 xc:'#006C4C' app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
        for size in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
          cp app/src/main/res/mipmap-$size/ic_launcher.png app/src/main/res/mipmap-$size/ic_launcher_round.png
        done
    
    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon
    
    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Rename APK
      run: |
        mv app/build/outputs/apk/release/app-release.apk \
           NetWeather-v${{ steps.get_version.outputs.VERSION }}.apk
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: NetWeather-v${{ steps.get_version.outputs.VERSION }}.apk
        name: NetWeather v${{ steps.get_version.outputs.VERSION }}
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}